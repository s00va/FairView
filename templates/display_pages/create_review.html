{% extends 'subpages/base.html' %}

{% block title %} Dashboard {% endblock %}

{% block header %} {% endblock %}

{% block body %}

{% include 'subpages/navbar_reviewer.html' %}

<div class="container py-5">
    <div class="card shadow-sm">
        <div class="card-body p-4 p-md-5">

            <div class="mb-4">
                <h5 class="card-title fw-semibold mb-1 display-5">Review Talk</h5>
                <p class="text-muted mb-0">Give a score and short feedback.</p>
            </div>

            <div id="feedback_container" class="mb-3"></div>

            <form class="row g-4" method="POST" action="" hx-post="" hx-target="#feedback_container">

                <div class="col-12">
                    <h6 class="border-bottom pb-2 mb-0">Talk Details</h6>
                </div>

                <div class="col-md-8">
                    <label class="form-label">Talk Title</label>
                    <input type="text" class="form-control" value="{{talkTitle}}" disabled>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Conference</label>
                    <input type="text" class="form-control" value="{{conference}}" disabled>
                </div>

                <div class="col-12">
                    <label class="form-label">Talk Description</label>
                    <textarea class="form-control" rows="5" disabled>{{talkDescription}}</textarea>
                </div>

                <div class="col-12">
                    <h6 class="border-bottom pb-2 mb-0 mt-2">Your Review</h6>
                </div>

                <div class="col-md-3">
                    <label for="score_input" class="form-label">Score</label>
                    <input type="number" class="form-control text-center" id="score_input" name="score_input" min="1"
                        max="10" step="1" placeholder="1-10" autocomplete="off" required>
                </div>

                <div class="col-12">
                    <label for="feedback_input" class="form-label">Feedback</label>
                    <textarea class="form-control" id="feedback_input" name="feedback_input" rows="5" maxlength="250"
                        placeholder="Your feedback of the talk..." autocomplete="off" required></textarea>
                    <div class="form-text">Maximum 250 characters.</div>
                </div>

                <div class="col-12 d-flex justify-content-end pt-2">
                    <button type="submit" class="btn btn-primary px-4">
                        Submit Review
                    </button>
                </div>

            </form>

        </div>
    </div>
</div>

{% endblock %}
